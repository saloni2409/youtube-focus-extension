<!-- popup.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <span id="logo">🎯 YouTube Focus</span>
      <a id="settings-link" href="#" title="Open full settings">⚙</a>
    </div>
    <p id="label">Active Profile</p>
    <div id="profiles-list"></div>
    <a id="manage-link" href="#">Manage profiles & shortcuts →</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>

<!-- ─────────────────────────────────────────────────────── popup.css ──── -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 280px;
  background: #0f0f0f;
  color: #fff;
  font-family: "Segoe UI", Roboto, sans-serif;
  padding: 0 0 12px;
}
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px 10px;
  border-bottom: 1px solid #272727;
}
#logo { font-size: 14px; font-weight: 700; }
#settings-link { color: #aaa; text-decoration: none; font-size: 18px; }
#settings-link:hover { color: #fff; }
#label { font-size: 11px; color: #888; padding: 12px 16px 6px; text-transform: uppercase; letter-spacing: .5px; }
.profile-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: calc(100% - 32px);
  margin: 4px 16px;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1.5px solid transparent;
  background: #1a1a1a;
  color: #ddd;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: background .15s, border-color .15s;
}
.profile-btn:hover { background: #242424; }
.profile-btn.active { border-color: var(--c); color: #fff; background: #1e1e1e; }
.profile-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--c);
  flex-shrink: 0;
}
.profile-meta { font-size: 10px; color: #666; margin-top: 2px; }
#manage-link {
  display: block;
  text-align: center;
  margin-top: 10px;
  font-size: 11px;
  color: #666;
  text-decoration: none;
}
#manage-link:hover { color: #aaa; }
</style>
